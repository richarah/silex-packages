name: Build single package

on:
  workflow_dispatch:
    inputs:
      package:
        description: 'Debian package name'
        required: true
        type: string
      mode:
        description: 'Build mode'
        required: true
        default: 'auto'
        type: choice
        options:
          - auto
          - repack
          - recompile
      arch:
        description: 'Target architecture'
        required: true
        default: 'x86_64'
        type: choice
        options:
          - x86_64
          - aarch64
          - both

jobs:
  build:
    name: ${{ inputs.package }} / ${{ inputs.arch }}
    runs-on: ${{ inputs.arch == 'aarch64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    if: inputs.arch != 'both'
    container:
      image: debian:bookworm
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          apt-get update -qq
          apt-get install -y --no-install-recommends \
              clang lld mold ninja-build cmake meson \
              dpkg-dev devscripts fakeroot build-essential \
              curl ca-certificates git file coreutils openssl

      - name: Install apk-tools (static binary)
        run: |
          _arch=${{ inputs.arch }}
          _suffix=""
          [ "$_arch" = "aarch64" ] && _suffix=".aarch64"
          curl -fsSL \
              "https://gitlab.alpinelinux.org/alpine/apk-tools/-/releases/v2.14.4/downloads/apk.static${_suffix}" \
              -o /usr/local/bin/apk
          chmod +x /usr/local/bin/apk

      - name: Setup signing keys
        run: |
          mkdir -p keys /tmp/silex-keys
          printf '%s' "$SILEX_PKG_RSA"     > /tmp/silex-keys/silex-packages.rsa
          printf '%s' "$SILEX_PKG_RSA_PUB" > /tmp/silex-keys/silex-packages.rsa.pub
        env:
          SILEX_PKG_RSA:     ${{ secrets.SILEX_PKG_RSA }}
          SILEX_PKG_RSA_PUB: ${{ secrets.SILEX_PKG_RSA_PUB }}

      - name: Enable deb-src
        run: |
          grep '^deb ' /etc/apt/sources.list \
              | sed 's/^deb /deb-src /' >> /etc/apt/sources.list
          apt-get update -qq

      - name: Override march for aarch64
        if: inputs.arch == 'aarch64'
        run: sed -i 's/-march=x86-64-v3/-march=armv8.2-a+crypto/' config/cflags.conf

      - name: Make scripts executable
        run: chmod +x scripts/*.sh

      - name: Build ${{ inputs.package }}
        run: scripts/build-one.sh "${{ inputs.package }}" "${{ inputs.mode }}"
        env:
          ARCH:    ${{ inputs.arch }}
          PRIVKEY: /tmp/silex-keys/silex-packages.rsa
          PUBKEY:  /tmp/silex-keys/silex-packages.rsa.pub

      - name: Index
        run: scripts/index.sh
        env:
          ARCH:    ${{ inputs.arch }}
          PRIVKEY: /tmp/silex-keys/silex-packages.rsa
          PUBKEY:  /tmp/silex-keys/silex-packages.rsa.pub

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.package }}-${{ inputs.arch }}
          path: ${{ inputs.arch }}/

  build-both:
    strategy:
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-latest
          - arch: aarch64
            runner: ubuntu-24.04-arm
    name: ${{ inputs.package }} / ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    if: inputs.arch == 'both'
    container:
      image: debian:bookworm
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          apt-get update -qq
          apt-get install -y --no-install-recommends \
              clang lld mold ninja-build cmake meson \
              dpkg-dev devscripts fakeroot build-essential \
              curl ca-certificates git file coreutils openssl

      - name: Install apk-tools (static binary)
        run: |
          _suffix=""
          [ "${{ matrix.arch }}" = "aarch64" ] && _suffix=".aarch64"
          curl -fsSL \
              "https://gitlab.alpinelinux.org/alpine/apk-tools/-/releases/v2.14.4/downloads/apk.static${_suffix}" \
              -o /usr/local/bin/apk
          chmod +x /usr/local/bin/apk

      - name: Setup signing keys
        run: |
          mkdir -p keys /tmp/silex-keys
          printf '%s' "$SILEX_PKG_RSA"     > /tmp/silex-keys/silex-packages.rsa
          printf '%s' "$SILEX_PKG_RSA_PUB" > /tmp/silex-keys/silex-packages.rsa.pub
        env:
          SILEX_PKG_RSA:     ${{ secrets.SILEX_PKG_RSA }}
          SILEX_PKG_RSA_PUB: ${{ secrets.SILEX_PKG_RSA_PUB }}

      - name: Enable deb-src
        run: |
          grep '^deb ' /etc/apt/sources.list \
              | sed 's/^deb /deb-src /' >> /etc/apt/sources.list
          apt-get update -qq

      - name: Override march for aarch64
        if: matrix.arch == 'aarch64'
        run: sed -i 's/-march=x86-64-v3/-march=armv8.2-a+crypto/' config/cflags.conf

      - name: Make scripts executable
        run: chmod +x scripts/*.sh

      - name: Build ${{ inputs.package }}
        run: scripts/build-one.sh "${{ inputs.package }}" "${{ inputs.mode }}"
        env:
          ARCH:    ${{ matrix.arch }}
          PRIVKEY: /tmp/silex-keys/silex-packages.rsa
          PUBKEY:  /tmp/silex-keys/silex-packages.rsa.pub

      - name: Index
        run: scripts/index.sh
        env:
          ARCH:    ${{ matrix.arch }}
          PRIVKEY: /tmp/silex-keys/silex-packages.rsa
          PUBKEY:  /tmp/silex-keys/silex-packages.rsa.pub

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.package }}-${{ matrix.arch }}
          path: ${{ matrix.arch }}/
