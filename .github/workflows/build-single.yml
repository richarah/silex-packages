name: Build single package

on:
  workflow_dispatch:
    inputs:
      package:
        description: 'Package name (directory under aports/)'
        required: true
        type: string
      arch:
        description: 'Target architecture'
        required: true
        default: 'x86_64'
        type: choice
        options:
          - x86_64
          - aarch64
          - both

jobs:
  build:
    name: ${{ inputs.package }} / ${{ inputs.arch }}
    runs-on: ${{ inputs.arch == 'aarch64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    if: inputs.arch != 'both'
    steps:
      - uses: actions/checkout@v4

      - name: Verify provides=
        run: |
          if ! grep -q '^provides=' "aports/${{ inputs.package }}/APKBUILD"; then
            echo "ERROR: aports/${{ inputs.package }}/APKBUILD missing provides="
            exit 1
          fi

      - name: Build ${{ inputs.package }}
        env:
          SILEX_PKG_RSA: ${{ secrets.SILEX_PKG_RSA }}
          SILEX_PKG_RSA_PUB: ${{ secrets.SILEX_PKG_RSA_PUB }}
          CFLAGS_MARCH: ${{ inputs.arch == 'aarch64' && 'armv8.2-a+crypto' || 'x86-64-v3' }}
        run: |
          docker run --rm \
            -v "$GITHUB_WORKSPACE:/work" -w /work \
            -e ABUILD_ALLOW_RUNNING_AS_ROOT=1 \
            -e SILEX_PKG_RSA -e SILEX_PKG_RSA_PUB \
            -e CFLAGS_MARCH \
            cgr.dev/chainguard/wolfi-base:latest \
            sh scripts/ci-build.sh "${{ inputs.package }}"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.package }}-${{ inputs.arch }}
          path: ${{ inputs.arch == 'aarch64' && 'aarch64' || 'x86_64' }}/

  build-both:
    strategy:
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-latest
            cflags_march: x86-64-v3
          - arch: aarch64
            runner: ubuntu-24.04-arm
            cflags_march: armv8.2-a+crypto
    name: ${{ inputs.package }} / ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    if: inputs.arch == 'both'
    steps:
      - uses: actions/checkout@v4

      - name: Verify provides=
        run: |
          if ! grep -q '^provides=' "aports/${{ inputs.package }}/APKBUILD"; then
            echo "ERROR: aports/${{ inputs.package }}/APKBUILD missing provides="
            exit 1
          fi

      - name: Build ${{ inputs.package }}
        env:
          SILEX_PKG_RSA: ${{ secrets.SILEX_PKG_RSA }}
          SILEX_PKG_RSA_PUB: ${{ secrets.SILEX_PKG_RSA_PUB }}
          CFLAGS_MARCH: ${{ matrix.cflags_march }}
        run: |
          docker run --rm \
            -v "$GITHUB_WORKSPACE:/work" -w /work \
            -e ABUILD_ALLOW_RUNNING_AS_ROOT=1 \
            -e SILEX_PKG_RSA -e SILEX_PKG_RSA_PUB \
            -e CFLAGS_MARCH \
            cgr.dev/chainguard/wolfi-base:latest \
            sh scripts/ci-build.sh "${{ inputs.package }}"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.package }}-${{ matrix.arch }}
          path: ${{ matrix.arch }}/
