name: Build packages

on:
  push:
    paths:
      - 'aports/**'
      - 'packages.list'
      - 'abuild.conf'
  workflow_dispatch:

jobs:
  lint:
    name: Lint APKBUILDs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify provides= present in all APKBUILDs
        run: |
          chmod +x scripts/verify-provides.sh
          scripts/verify-provides.sh

  build-x86_64:
    name: x86_64
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build and index packages
        env:
          SILEX_PKG_RSA: ${{ secrets.SILEX_PKG_RSA }}
          SILEX_PKG_RSA_PUB: ${{ secrets.SILEX_PKG_RSA_PUB }}
        run: |
          docker run --rm \
            -v "$GITHUB_WORKSPACE:/work" -w /work \
            -e ABUILD_ALLOW_RUNNING_AS_ROOT=1 \
            -e SILEX_PKG_RSA -e SILEX_PKG_RSA_PUB \
            cgr.dev/chainguard/wolfi-base:latest \
            sh scripts/ci-build.sh

      - uses: actions/upload-artifact@v4
        with:
          name: packages-x86_64
          path: x86_64/

  build-aarch64:
    name: aarch64
    needs: lint
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Build and index packages
        env:
          SILEX_PKG_RSA: ${{ secrets.SILEX_PKG_RSA }}
          SILEX_PKG_RSA_PUB: ${{ secrets.SILEX_PKG_RSA_PUB }}
          CFLAGS_MARCH: armv8.2-a+crypto
        run: |
          docker run --rm \
            -v "$GITHUB_WORKSPACE:/work" -w /work \
            -e ABUILD_ALLOW_RUNNING_AS_ROOT=1 \
            -e SILEX_PKG_RSA -e SILEX_PKG_RSA_PUB \
            -e CFLAGS_MARCH \
            cgr.dev/chainguard/wolfi-base:latest \
            sh scripts/ci-build.sh

      - uses: actions/upload-artifact@v4
        with:
          name: packages-aarch64
          path: aarch64/

  deploy:
    name: Deploy to Pages
    needs: [build-x86_64, build-aarch64]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: packages-x86_64
          path: x86_64/

      - uses: actions/download-artifact@v4
        with:
          name: packages-aarch64
          path: aarch64/

      - name: Commit and push
        run: |
          git config user.name "silex-ci"
          git config user.email "ci@silex"
          git add x86_64/ aarch64/ keys/
          git commit -m "rebuild $(date -u +%Y-%m-%dT%H:%M:%SZ)" || true
          git push
