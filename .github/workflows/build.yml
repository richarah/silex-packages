name: Build packages

on:
  push:
    paths:
      - 'config/**'
      - 'scripts/**'
  schedule:
    - cron: '0 4 * * 1'  # weekly Monday 04:00 UTC; catches bookworm security updates
  workflow_dispatch:

jobs:
  build-x86_64:
    name: x86_64
    runs-on: ubuntu-latest
    container:
      image: debian:bookworm
    steps:
      - uses: actions/checkout@v4

      - name: Restore package cache
        uses: actions/cache@v4
        with:
          path: x86_64/
          key: packages-x86_64-${{ hashFiles('config/seeds.list', 'scripts/**') }}
          restore-keys: packages-x86_64-
          save-always: true

      - name: Install build dependencies
        run: |
          apt-get update -qq
          apt-get install -y --no-install-recommends \
              clang mold ninja-build cmake meson autoconf automake \
              dpkg-dev devscripts fakeroot build-essential \
              curl ca-certificates git file openssl \
              libzstd-dev libssl-dev zlib1g-dev

      - name: Build apk-tools from source (static, +zstd)
        run: |
          curl -fsSL --retry 5 --retry-delay 5 \
              "https://gitlab.alpinelinux.org/alpine/apk-tools/-/archive/v3.0.5/apk-tools-v3.0.5.tar.gz" \
              -o /tmp/apk-tools.tar.gz
          echo "e9d7398d5f70badea596903599bfa1e05b64d67d13c929da9f0eee85828260c6  /tmp/apk-tools.tar.gz" | sha256sum -c -
          tar xf /tmp/apk-tools.tar.gz -C /tmp
          cd /tmp/apk-tools-v3.0.5
          # strlcpy is absent from glibc < 2.38 (Debian bookworm = 2.36); inject compat.
          printf '#pragma once\n#include <string.h>\n#ifndef strlcpy\nstatic inline size_t strlcpy(char*d,const char*s,size_t n){size_t l=strlen(s);if(n){size_t c=l<n-1?l:n-1;__builtin_memcpy(d,s,c);d[c]=0;}return l;}\n#endif\n' \
              > /tmp/strlcpy_compat.h
          make -j$(nproc) \
              CC=clang \
              CFLAGS="-O2 -include /tmp/strlcpy_compat.h" \
              STATIC=y \
              LUA=no
          install -m755 src/apk.static /usr/local/bin/apk
          # Verify zstd was linked in (ZSTD_ symbols present in static binary).
          nm src/apk.static 2>/dev/null | grep -q 'ZSTD_compress' \
              && printf 'apk: zstd support: yes\n' \
              || printf 'apk: zstd support: no (ZSTD_compress not found)\n'

      - name: Upload apk binary (for test job)
        uses: actions/upload-artifact@v4
        with:
          name: apk-static-x86_64
          path: /usr/local/bin/apk

      - name: Setup signing keys
        run: |
          mkdir -p keys /tmp/silex-keys
          printf '%s' "$SILEX_PKG_RSA"     > /tmp/silex-keys/silex-packages.rsa
          printf '%s' "$SILEX_PKG_RSA_PUB" > /tmp/silex-keys/silex-packages.rsa.pub
          chmod 600 /tmp/silex-keys/silex-packages.rsa
          cp /tmp/silex-keys/silex-packages.rsa.pub keys/
        env:
          SILEX_PKG_RSA:     ${{ secrets.SILEX_PKG_RSA }}
          SILEX_PKG_RSA_PUB: ${{ secrets.SILEX_PKG_RSA_PUB }}

      - name: Enable deb-src
        run: |
          # DEB822 format (debian:bookworm uses sources.list.d/debian.sources)
          if [ -f /etc/apt/sources.list.d/debian.sources ]; then
            sed -i 's/^Types: deb$/Types: deb deb-src/' \
                /etc/apt/sources.list.d/debian.sources
          elif [ -f /etc/apt/sources.list ]; then
            grep '^deb ' /etc/apt/sources.list \
                | sed 's/^deb /deb-src /' >> /etc/apt/sources.list
          fi
          apt-get update -qq

      - name: Make scripts executable
        run: chmod +x scripts/*.sh

      - name: Build all packages
        run: scripts/build-all.sh
        env:
          ARCH:    x86_64
          PRIVKEY: /tmp/silex-keys/silex-packages.rsa
          PUBKEY:  /tmp/silex-keys/silex-packages.rsa.pub

      - name: Verify
        run: scripts/verify.sh x86_64

      - uses: actions/upload-artifact@v4
        with:
          name: packages-x86_64
          path: x86_64/

  build-aarch64:
    name: aarch64
    runs-on: ubuntu-24.04-arm
    container:
      image: debian:bookworm
    steps:
      - uses: actions/checkout@v4

      - name: Restore package cache
        uses: actions/cache@v4
        with:
          path: aarch64/
          key: packages-aarch64-${{ hashFiles('config/seeds.list', 'scripts/**') }}
          restore-keys: packages-aarch64-
          save-always: true

      - name: Install build dependencies
        run: |
          apt-get update -qq
          apt-get install -y --no-install-recommends \
              clang mold ninja-build cmake meson autoconf automake \
              dpkg-dev devscripts fakeroot build-essential \
              curl ca-certificates git file openssl \
              libzstd-dev libssl-dev zlib1g-dev

      - name: Build apk-tools from source (static, +zstd)
        run: |
          curl -fsSL --retry 5 --retry-delay 5 \
              "https://gitlab.alpinelinux.org/alpine/apk-tools/-/archive/v3.0.5/apk-tools-v3.0.5.tar.gz" \
              -o /tmp/apk-tools.tar.gz
          echo "e9d7398d5f70badea596903599bfa1e05b64d67d13c929da9f0eee85828260c6  /tmp/apk-tools.tar.gz" | sha256sum -c -
          tar xf /tmp/apk-tools.tar.gz -C /tmp
          cd /tmp/apk-tools-v3.0.5
          printf '#pragma once\n#include <string.h>\n#ifndef strlcpy\nstatic inline size_t strlcpy(char*d,const char*s,size_t n){size_t l=strlen(s);if(n){size_t c=l<n-1?l:n-1;__builtin_memcpy(d,s,c);d[c]=0;}return l;}\n#endif\n' \
              > /tmp/strlcpy_compat.h
          make -j$(nproc) \
              CC=clang \
              CFLAGS="-O2 -include /tmp/strlcpy_compat.h" \
              STATIC=y \
              LUA=no
          install -m755 src/apk.static /usr/local/bin/apk
          nm src/apk.static 2>/dev/null | grep -q 'ZSTD_compress' \
              && printf 'apk: zstd support: yes\n' \
              || printf 'apk: zstd support: no (ZSTD_compress not found)\n'

      - name: Setup signing keys
        run: |
          mkdir -p keys /tmp/silex-keys
          printf '%s' "$SILEX_PKG_RSA"     > /tmp/silex-keys/silex-packages.rsa
          printf '%s' "$SILEX_PKG_RSA_PUB" > /tmp/silex-keys/silex-packages.rsa.pub
          chmod 600 /tmp/silex-keys/silex-packages.rsa
          cp /tmp/silex-keys/silex-packages.rsa.pub keys/
        env:
          SILEX_PKG_RSA:     ${{ secrets.SILEX_PKG_RSA }}
          SILEX_PKG_RSA_PUB: ${{ secrets.SILEX_PKG_RSA_PUB }}

      - name: Enable deb-src
        run: |
          if [ -f /etc/apt/sources.list.d/debian.sources ]; then
            sed -i 's/^Types: deb$/Types: deb deb-src/' \
                /etc/apt/sources.list.d/debian.sources
          elif [ -f /etc/apt/sources.list ]; then
            grep '^deb ' /etc/apt/sources.list \
                | sed 's/^deb /deb-src /' >> /etc/apt/sources.list
          fi
          apt-get update -qq

      - name: Override march for aarch64
        run: |
          sed -i 's/-march=x86-64-v3/-march=armv8.2-a+crypto/' config/cflags.conf
          # Use binutils 'as' instead of clang's integrated assembler.
          # Required for packages (e.g. pixman) whose ARM64 assembly uses
          # GNU AS extensions (.endfunc) that clang's integrated assembler rejects.
          sed -i 's/-fomit-frame-pointer/-fomit-frame-pointer -fno-integrated-as/' config/cflags.conf

      - name: Make scripts executable
        run: chmod +x scripts/*.sh

      - name: Build all packages
        run: scripts/build-all.sh
        env:
          ARCH:    aarch64
          PRIVKEY: /tmp/silex-keys/silex-packages.rsa
          PUBKEY:  /tmp/silex-keys/silex-packages.rsa.pub

      - name: Verify
        run: scripts/verify.sh aarch64

      - uses: actions/upload-artifact@v4
        with:
          name: packages-aarch64
          path: aarch64/

  test:
    name: Test (x86_64)
    needs: [build-x86_64]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: packages-x86_64
          path: x86_64/

      - name: Download apk binary (built with zstd)
        uses: actions/download-artifact@v4
        with:
          name: apk-static-x86_64
          path: /usr/local/bin/

      - run: chmod +x /usr/local/bin/apk

      - name: Test package install
        run: |
          set -e
          R=/tmp/pkgroot
          mkdir -p "$R/etc/apk/keys" "$R/var/cache/apk" \
                   "$R/var/lib/apk" "$R/lib/apk/db"
          cp keys/*.rsa.pub "$R/etc/apk/keys/"
          # Repository base URL without arch; apk v3 appends /$arch automatically.
          printf 'file://%s\n' "$GITHUB_WORKSPACE" > "$R/etc/apk/repositories"
          printf 'x86_64\n' > "$R/etc/apk/arch"

          # apk v3 requires explicit database initialization before first use.
          # Test runner is non-root; --usermode allows initdb without root.
          /usr/local/bin/apk --root "$R" add --initdb --usermode

          /usr/local/bin/apk --root "$R" --allow-untrusted update

          # apk mkndx (v3 format) produces a binary ADB file, not a plain tar;
          # count available packages via apk list after the update.
          count=$(/usr/local/bin/apk --root "$R" --allow-untrusted list --available \
                      2>/dev/null | wc -l || echo 0)
          printf 'index: %d packages\n' "$count"
          [ "$count" -gt 50 ] || { printf 'FAIL: expected >50 packages in index\n'; exit 1; }

          # apk v3 removed --force-depends; use 'extract' which skips dep checks.
          # Packages are already downloaded as artifacts, so use local files.
          # Use packages from the repack path (not recompile) for reliability.
          /usr/local/bin/apk extract --allow-untrusted \
              --destination "$R" \
              x86_64/zlib1g-dev-*.x86_64.apk \
              x86_64/libffi-dev-*.x86_64.apk \
              x86_64/bzip2-*.x86_64.apk

          test -f "$R/usr/include/zlib.h" || { printf 'FAIL: zlib.h missing\n'; exit 1; }
          test -f "$R/usr/include/ffi.h"  || { printf 'FAIL: ffi.h missing\n';  exit 1; }
          test -f "$R/bin/bzip2"          || { printf 'FAIL: bzip2 missing\n';  exit 1; }
          printf 'install test: PASS\n'

  deploy:
    name: Deploy to Pages
    needs: [build-x86_64, build-aarch64, test]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: packages-x86_64
          path: x86_64/

      - uses: actions/download-artifact@v4
        with:
          name: packages-aarch64
          path: aarch64/

      - name: Commit and push
        run: |
          git config user.name "silex-ci"
          git config user.email "ci@silex"
          # Stage additions, modifications, AND deletions (e.g. v2→v3 format migration).
          # -f to force-add files that are in .gitignore (*.apk, APKINDEX.tar.gz).
          git add -f x86_64/ aarch64/ keys/
          git commit -m "rebuild $(date -u +%Y-%m-%dT%H:%M:%SZ)" || true
          git pull --rebase origin main
          git push
