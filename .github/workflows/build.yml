          cp /tmp/silex-keys/silex-packages.rsa.pub "/etc/apk/keys/-${KEYID}.rsa.pub"
          cp /tmp/silex-keys/silex-packages.rsa.pub "keys/-${KEYID}.rsa.pub"
        env:
          SILEX_PKG_RSA:     ${{ secrets.SILEX_PKG_RSA }}
          SILEX_PKG_RSA_PUB: ${{ secrets.SILEX_PKG_RSA_PUB }}
      - uses: actions/download-artifact@v5
        with:
          name: lists-x86_64
          path: .
      - name: Download L0 packages
        uses: actions/download-artifact@v5
        with:
          name: recompiled-x86-L0
          path: x86_64/
      - run: chmod +x scripts/*.sh
      - name: Compile apk-tar
        run: cc -O2 -o /tmp/silex-apk-tar scripts/apk-tar.c
      - name: Recompile layer 1
        run: scripts/recompile-layer.sh 1
        env:
          ARCH:    x86_64
          PRIVKEY: /tmp/silex-keys/silex-packages.rsa
          PUBKEY:  /tmp/silex-keys/silex-packages.rsa.pub
      - uses: actions/upload-artifact@v5
        with:
          name: recompiled-x86-L1
          path: x86_64/*.apk
          if-no-files-found: ignore

  merge-x86:
    name: Merge & index (x86_64)
    needs: [repack-x86, recompile-x86-L1]
    runs-on: ubuntu-latest
    container:
      image: alpine:3.23
    steps:
      - uses: actions/checkout@v5
      - name: Install deps
        run: apk add --no-cache openssl abuild

      - name: Keys
        run: |
          mkdir -p keys /tmp/silex-keys /etc/apk/keys
          echo "$SILEX_PKG_RSA"     > /tmp/silex-keys/silex-packages.rsa
          echo "$SILEX_PKG_RSA_PUB" > /tmp/silex-keys/silex-packages.rsa.pub
          chmod 600 /tmp/silex-keys/silex-packages.rsa
          cp /tmp/silex-keys/silex-packages.rsa.pub keys/
          cp /tmp/silex-keys/silex-packages.rsa.pub /etc/apk/keys/
        env:
          SILEX_PKG_RSA:     ${{ secrets.SILEX_PKG_RSA }}
          SILEX_PKG_RSA_PUB: ${{ secrets.SILEX_PKG_RSA_PUB }}
      - name: Download repacked
        uses: actions/download-artifact@v5
        with:
          pattern: repack-x86-*
          path: x86_64/
          merge-multiple: true
      - name: Download recompiled L0
        uses: actions/download-artifact@v5
        with:
          name: recompiled-x86-L0
          path: x86_64/
      - name: Download recompiled L1
        uses: actions/download-artifact@v5
        with:
          name: recompiled-x86-L1
          path: x86_64/
      - run: chmod +x scripts/*.sh
      - name: Index
        run: scripts/index.sh
        env:
          ARCH:     x86_64
          REPO_DIR: x86_64
          PRIVKEY:  /tmp/silex-keys/silex-packages.rsa
          PUBKEY:   /tmp/silex-keys/silex-packages.rsa.pub
      - name: Verify
        run: scripts/verify.sh x86_64
      - uses: actions/upload-artifact@v5
        with:
          name: packages-x86_64
          path: x86_64/

  # ── aarch64 ─────────────────────────────────────────────

  prep-arm:
    name: Prep (aarch64)
    runs-on: ubuntu-24.04-arm
