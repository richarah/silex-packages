name: Build packages

on:
  push:
    paths:
      - 'aports/**'
      - 'packages.list'
      - 'abuild.conf'
  workflow_dispatch:

jobs:
  lint:
    name: Lint APKBUILDs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify provides= present in all APKBUILDs
        run: |
          chmod +x scripts/verify-provides.sh
          scripts/verify-provides.sh

  build-x86_64:
    name: x86_64
    needs: lint
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/richarah/silex:slim
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: apk add --no-cache abuild alpine-sdk pigz

      - name: Configure abuild
        run: |
          cp abuild.conf /etc/abuild.conf
          mkdir -p /etc/apk/keys
          echo "${{ secrets.SILEX_PKG_RSA }}" > /etc/apk/keys/silex-packages.rsa
          echo "${{ secrets.SILEX_PKG_RSA_PUB }}" > /etc/apk/keys/silex-packages.rsa.pub
          cp /etc/apk/keys/silex-packages.rsa.pub keys/
          # abuild needs a key configured in ~/.abuild/
          mkdir -p ~/.abuild
          echo 'PACKAGER_PRIVKEY="/etc/apk/keys/silex-packages.rsa"' > ~/.abuild/abuild.conf

      - name: Build all packages
        run: |
          chmod +x scripts/*.sh
          scripts/build-all.sh

      - name: Generate and sign index
        run: scripts/index.sh

      - uses: actions/upload-artifact@v4
        with:
          name: packages-x86_64
          path: x86_64/

  build-aarch64:
    name: aarch64
    needs: lint
    runs-on: ubuntu-24.04-arm
    container:
      image: ghcr.io/richarah/silex:slim
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: apk add --no-cache abuild alpine-sdk pigz

      - name: Configure abuild
        run: |
          # Override CFLAGS for aarch64
          sed 's/-march=x86-64-v3/-march=armv8.2-a+crypto/' abuild.conf \
            > /etc/abuild.conf
          mkdir -p /etc/apk/keys
          echo "${{ secrets.SILEX_PKG_RSA }}" > /etc/apk/keys/silex-packages.rsa
          echo "${{ secrets.SILEX_PKG_RSA_PUB }}" > /etc/apk/keys/silex-packages.rsa.pub
          cp /etc/apk/keys/silex-packages.rsa.pub keys/
          mkdir -p ~/.abuild
          echo 'PACKAGER_PRIVKEY="/etc/apk/keys/silex-packages.rsa"' > ~/.abuild/abuild.conf

      - name: Build all packages
        run: |
          chmod +x scripts/*.sh
          scripts/build-all.sh

      - name: Generate and sign index
        run: scripts/index.sh

      - uses: actions/upload-artifact@v4
        with:
          name: packages-aarch64
          path: aarch64/

  deploy:
    name: Deploy to Pages
    needs: [build-x86_64, build-aarch64]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: packages-x86_64
          path: x86_64/

      - uses: actions/download-artifact@v4
        with:
          name: packages-aarch64
          path: aarch64/

      - name: Commit and push
        run: |
          git config user.name "silex-ci"
          git config user.email "ci@silex"
          git add x86_64/ aarch64/ keys/
          git commit -m "rebuild $(date -u +%Y-%m-%dT%H:%M:%SZ)" || true
          git push
