      - uses: actions/upload-artifact@v5
        with:
          name: recompiled-arm-L1
          path: aarch64/*.apk
          if-no-files-found: ignore

  merge-arm:
    name: Merge & index (aarch64)
    needs: [repack-arm, recompile-arm-L1]
    runs-on: ubuntu-24.04-arm
    container:
      image: alpine:3.23
    steps:
      - uses: actions/checkout@v5
      - name: Install deps
        run: apk add --no-cache openssl abuild
      - name: Keys
        run: |
          mkdir -p keys /tmp/silex-keys /etc/apk/keys
          echo "$SILEX_PKG_RSA"     > /tmp/silex-keys/silex-packages.rsa
          echo "$SILEX_PKG_RSA_PUB" > /tmp/silex-keys/silex-packages.rsa.pub
          chmod 600 /tmp/silex-keys/silex-packages.rsa
          cp /tmp/silex-keys/silex-packages.rsa.pub keys/
          cp /tmp/silex-keys/silex-packages.rsa.pub /etc/apk/keys/
        env:
          SILEX_PKG_RSA:     ${{ secrets.SILEX_PKG_RSA }}
          SILEX_PKG_RSA_PUB: ${{ secrets.SILEX_PKG_RSA_PUB }}
      - name: Download repacked
        uses: actions/download-artifact@v5
        with:
          pattern: repack-arm-*
          path: aarch64/
          merge-multiple: true
      - name: Download recompiled L0
        uses: actions/download-artifact@v5
        with:
          name: recompiled-arm-L0
          path: aarch64/
      - name: Download recompiled L1
        uses: actions/download-artifact@v5
        with:
          name: recompiled-arm-L1
          path: aarch64/
      - run: chmod +x scripts/*.sh
      - name: Index
        run: scripts/index.sh
        env:
          ARCH:     aarch64
          REPO_DIR: aarch64
          PRIVKEY:  /tmp/silex-keys/silex-packages.rsa
          PUBKEY:   /tmp/silex-keys/silex-packages.rsa.pub
      - name: Verify
        run: scripts/verify.sh aarch64
      - uses: actions/upload-artifact@v5
        with:
          name: packages-aarch64
          path: aarch64/

  sign-indexes:
    name: Sign indexes
    needs: [merge-x86, merge-arm]
    runs-on: ubuntu-latest
    container:
      image: alpine:3.23
    steps:
      - uses: actions/checkout@v5
      - name: Install deps
        run: apk add --no-cache openssl abuild
      - name: Keys
        run: |
          mkdir -p /tmp/silex-keys /etc/apk/keys
          echo "$SILEX_PKG_RSA"     > /tmp/silex-keys/silex-packages.rsa
          echo "$SILEX_PKG_RSA_PUB" > /tmp/silex-keys/silex-packages.rsa.pub
          chmod 600 /tmp/silex-keys/silex-packages.rsa
          cp /tmp/silex-keys/silex-packages.rsa.pub /etc/apk/keys/
        env:
          SILEX_PKG_RSA:     ${{ secrets.SILEX_PKG_RSA }}
          SILEX_PKG_RSA_PUB: ${{ secrets.SILEX_PKG_RSA_PUB }}
      - uses: actions/download-artifact@v5
        with:
          name: packages-x86_64
          path: x86_64/
      - uses: actions/download-artifact@v5
        with:
          name: packages-aarch64
          path: aarch64/
      - name: Sign both indexes
        run: |
          for idx in x86_64/APKINDEX.tar.gz aarch64/APKINDEX.tar.gz; do
            if [ -f "$idx" ]; then
              PACKAGER_PRIVKEY=/tmp/silex-keys/silex-packages.rsa \
                abuild-sign -k /tmp/silex-keys/silex-packages.rsa "$idx"
            else
              printf 'sign: %s not found, skipping\n' "$idx"
            fi
          done
      - uses: actions/upload-artifact@v5
        with:
          name: signed-x86_64
          path: x86_64/
      - uses: actions/upload-artifact@v5
        with:
          name: signed-aarch64
          path: aarch64/

  # ── test & deploy ───────────────────────────────────────

  test:
    name: Test (x86_64)
    needs: sign-indexes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/download-artifact@v5
        with:
          name: packages-x86_64
          path: x86_64/
      - name: Get apk
        run: |
          curl -fsSL --retry 5 \
              "https://dl-cdn.alpinelinux.org/alpine/v3.23/main/x86_64/apk-tools-static-3.0.5-r0.apk" \
              -o /tmp/apk.apk
          tar -xzf /tmp/apk.apk -C /tmp
          sudo cp /tmp/sbin/apk.static /usr/local/bin/apk
          sudo chmod +x /usr/local/bin/apk
      - name: Test
        run: |
          set -e
          R=/tmp/pkgroot
          mkdir -p "$R/etc/apk/keys" "$R/var/cache/apk" \
                   "$R/var/lib/apk" "$R/lib/apk/db"
          cp keys/*.rsa.pub "$R/etc/apk/keys/"
          printf 'file://%s\n' "$GITHUB_WORKSPACE" > "$R/etc/apk/repositories"
          printf 'x86_64\n' > "$R/etc/apk/arch"
          /usr/local/bin/apk --root "$R" add --initdb --usermode
          /usr/local/bin/apk --root "$R" --allow-untrusted update
          count=$(/usr/local/bin/apk --root "$R" --allow-untrusted list --available 2>/dev/null | wc -l || echo 0)
          printf 'index: %d packages\n' "$count"
          [ "$count" -gt 50 ] || { printf 'FAIL: expected >50\n'; exit 1; }
          /usr/local/bin/apk extract --allow-untrusted --destination "$R" \
              x86_64/zlib1g-dev-*.x86_64.apk \
              x86_64/libffi-dev-*.x86_64.apk \
              x86_64/bzip2-*.x86_64.apk
          test -f "$R/usr/include/zlib.h" || { printf 'FAIL: zlib.h\n'; exit 1; }
          test -f "$R/usr/include/ffi.h" -o -f "$R/usr/include/x86_64-linux-gnu/ffi.h"  || { printf 'FAIL: ffi.h\n';  exit 1; }
          test -f "$R/bin/bzip2"          || { printf 'FAIL: bzip2\n';  exit 1; }
          printf 'PASS\n'

  deploy:
    name: Deploy to Pages
    needs: [sign-indexes, test]
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/download-artifact@v5
        with:
          name: signed-x86_64
          path: x86_64/
      - uses: actions/download-artifact@v5
        with:
          name: signed-aarch64
          path: aarch64/
      - uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site
      - name: Copy packages
        run: |
          sudo sudo mkdir -p ./_site/x86_64 ./_site/aarch64 ./_site/keys && sudo chmod -R 777 ./_site/ && sudo chmod -R 777 ./_site/
          cp -r x86_64/* ./_site/x86_64/
          cp -r aarch64/* ./_site/aarch64/
          cp -r keys/* ./_site/keys/
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
