name: Build packages (parallel)

on:
  push:
    paths:
      - 'config/**'
      - 'scripts/**'
      - '.github/workflows/**'
      - 'Makefile'
  schedule:
    - cron: '0 4 * * 1'
  workflow_dispatch:

jobs:
  build:
    name: Build (x86_64 + aarch64)
    runs-on: [self-hosted, linux]
    container:
      image: debian:bookworm
    steps:
      - uses: actions/checkout@v5

      - name: Install build dependencies
        run: |
          apt-get update -qq
          apt-get install -y --no-install-recommends \
              clang mold ninja-build cmake meson autoconf automake \
              dpkg-dev devscripts fakeroot build-essential \
              curl ca-certificates git file openssl \
              libzstd-dev libssl-dev zlib1g-dev pkg-config \
              qemu-user-static

      - name: Install apk-tools
        run: |
          curl -fsSL \
              "https://gitlab.alpinelinux.org/api/v4/projects/5/packages/generic//v2.14.4/x86_64/apk.static" \
              -o /usr/local/bin/apk
          chmod +x /usr/local/bin/apk

      - name: Fix apt sandbox
        run: |
          echo 'APT::Sandbox::User "root";' > /etc/apt/apt.conf.d/99sandbox
          mkdir -p /var/lib/apt/lists/partial
          chown -R _apt:root /var/lib/apt/lists 2>/dev/null || true
          chmod 755 /var/lib/apt/lists

      - name: Enable deb-src
        run: |
          if [ -f /etc/apt/sources.list.d/debian.sources ]; then
            sed -i 's/^Types: deb$/Types: deb deb-src/' /etc/apt/sources.list.d/debian.sources
          elif [ -f /etc/apt/sources.list ]; then
            grep '^deb ' /etc/apt/sources.list | sed 's/^deb /deb-src /' >> /etc/apt/sources.list
          fi
          apt-get update -qq

      - name: Setup signing keys
        run: |
          mkdir -p /tmp/silex-keys /etc/apk/keys
          echo "$SILEX_PKG_RSA"     > /tmp/silex-keys/silex-packages.rsa
          echo "$SILEX_PKG_RSA_PUB" > /tmp/silex-keys/silex-packages.rsa.pub
          chmod 600 /tmp/silex-keys/silex-packages.rsa
          cp /tmp/silex-keys/silex-packages.rsa.pub /etc/apk/keys/
          cp /tmp/silex-keys/silex-packages.rsa.pub keys/
        env:
          SILEX_PKG_RSA:     ${{ secrets.SILEX_PKG_RSA }}
          SILEX_PKG_RSA_PUB: ${{ secrets.SILEX_PKG_RSA_PUB }}

      - name: Make scripts executable
        run: chmod +x scripts/*.sh

      - name: Build (x86_64 + aarch64)
        run: make -j 32 build
        env:
          PRIVKEY: /tmp/silex-keys/silex-packages.rsa
          PUBKEY:  /tmp/silex-keys/silex-packages.rsa.pub

      - name: Upload build artifacts
        if: success()
        uses: actions/upload-artifact@v5
        with:
          name: silex-packages-apks
          path: |
            x86_64/
            aarch64/

  sign-indexes:
    name: Sign APKINDEXes
    needs: build
    runs-on: [self-hosted, linux]
    container:
      image: alpine:3.23
    steps:
      - uses: actions/checkout@v5

      - name: Install signing tools
        run: apk add --no-cache openssl abuild

      - name: Download build artifacts
        uses: actions/download-artifact@v5
        with:
          name: silex-packages-apks
          path: .

      - name: Setup signing keys
        run: |
          mkdir -p /tmp/silex-keys /etc/apk/keys
          echo "$SILEX_PKG_RSA"     > /tmp/silex-keys/silex-packages.rsa
          echo "$SILEX_PKG_RSA_PUB" > /tmp/silex-keys/silex-packages.rsa.pub
          chmod 600 /tmp/silex-keys/silex-packages.rsa
          cp /tmp/silex-keys/silex-packages.rsa.pub /etc/apk/keys/
        env:
          SILEX_PKG_RSA:     ${{ secrets.SILEX_PKG_RSA }}
          SILEX_PKG_RSA_PUB: ${{ secrets.SILEX_PKG_RSA_PUB }}

      - name: Sign APKINDEXes
        run: |
          for arch in x86_64 aarch64; do
            abuild-sign -k /tmp/silex-keys/silex-packages.rsa "$arch/APKINDEX.tar.gz" &
          done
          wait
          echo "✓ Signing complete"

      - name: Upload signed artifacts
        uses: actions/upload-artifact@v5
        with:
          name: silex-packages-signed
          path: |
            x86_64/APKINDEX.tar.gz*
            aarch64/APKINDEX.tar.gz*

      - name: Commit results
        run: |
          git config user.email "ci@silex"
          git config user.name "CI Bot"
          git add x86_64/ aarch64/
          git commit -m "build: rebuild APK repository ($(date -u +%Y-%m-%d))" || true
          git push || true
