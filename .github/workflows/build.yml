name: Build packages

on:
  push:
    paths:
      - 'config/**'
      - 'scripts/**'
  schedule:
    - cron: '0 4 * * 1'  # weekly Monday 04:00 UTC; catches bookworm security updates
  workflow_dispatch:

jobs:
  build-x86_64:
    name: x86_64
    runs-on: ubuntu-latest
    container:
      image: debian:bookworm
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          apt-get update -qq
          apt-get install -y --no-install-recommends \
              clang mold ninja-build cmake meson autoconf automake \
              dpkg-dev devscripts fakeroot build-essential \
              curl ca-certificates git file openssl

      - name: Install apk-tools (static binary)
        run: |
          curl -fsSL --retry 5 --retry-delay 10 \
              "https://gitlab.alpinelinux.org/api/v4/projects/5/packages/generic//v2.14.4/x86_64/apk.static" \
              -o /usr/local/bin/apk
          chmod +x /usr/local/bin/apk

      - name: Setup signing keys
        run: |
          mkdir -p keys /tmp/silex-keys
          printf '%s' "$SILEX_PKG_RSA"     > /tmp/silex-keys/silex-packages.rsa
          printf '%s' "$SILEX_PKG_RSA_PUB" > /tmp/silex-keys/silex-packages.rsa.pub
          chmod 600 /tmp/silex-keys/silex-packages.rsa
          cp /tmp/silex-keys/silex-packages.rsa.pub keys/
        env:
          SILEX_PKG_RSA:     ${{ secrets.SILEX_PKG_RSA }}
          SILEX_PKG_RSA_PUB: ${{ secrets.SILEX_PKG_RSA_PUB }}

      - name: Enable deb-src
        run: |
          # DEB822 format (debian:bookworm uses sources.list.d/debian.sources)
          if [ -f /etc/apt/sources.list.d/debian.sources ]; then
            sed -i 's/^Types: deb$/Types: deb deb-src/' \
                /etc/apt/sources.list.d/debian.sources
          elif [ -f /etc/apt/sources.list ]; then
            grep '^deb ' /etc/apt/sources.list \
                | sed 's/^deb /deb-src /' >> /etc/apt/sources.list
          fi
          apt-get update -qq

      - name: Make scripts executable
        run: chmod +x scripts/*.sh

      - name: Build all packages
        run: scripts/build-all.sh
        env:
          ARCH:    x86_64
          PRIVKEY: /tmp/silex-keys/silex-packages.rsa
          PUBKEY:  /tmp/silex-keys/silex-packages.rsa.pub

      - name: Verify
        run: scripts/verify.sh x86_64

      - uses: actions/upload-artifact@v4
        with:
          name: packages-x86_64
          path: x86_64/

  build-aarch64:
    name: aarch64
    runs-on: ubuntu-24.04-arm
    container:
      image: debian:bookworm
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          apt-get update -qq
          apt-get install -y --no-install-recommends \
              clang mold ninja-build cmake meson autoconf automake \
              dpkg-dev devscripts fakeroot build-essential \
              curl ca-certificates git file openssl

      - name: Install apk-tools (static binary)
        run: |
          curl -fsSL --retry 5 --retry-delay 10 \
              "https://gitlab.alpinelinux.org/api/v4/projects/5/packages/generic//v2.14.4/aarch64/apk.static" \
              -o /usr/local/bin/apk
          chmod +x /usr/local/bin/apk

      - name: Setup signing keys
        run: |
          mkdir -p keys /tmp/silex-keys
          printf '%s' "$SILEX_PKG_RSA"     > /tmp/silex-keys/silex-packages.rsa
          printf '%s' "$SILEX_PKG_RSA_PUB" > /tmp/silex-keys/silex-packages.rsa.pub
          chmod 600 /tmp/silex-keys/silex-packages.rsa
          cp /tmp/silex-keys/silex-packages.rsa.pub keys/
        env:
          SILEX_PKG_RSA:     ${{ secrets.SILEX_PKG_RSA }}
          SILEX_PKG_RSA_PUB: ${{ secrets.SILEX_PKG_RSA_PUB }}

      - name: Enable deb-src
        run: |
          if [ -f /etc/apt/sources.list.d/debian.sources ]; then
            sed -i 's/^Types: deb$/Types: deb deb-src/' \
                /etc/apt/sources.list.d/debian.sources
          elif [ -f /etc/apt/sources.list ]; then
            grep '^deb ' /etc/apt/sources.list \
                | sed 's/^deb /deb-src /' >> /etc/apt/sources.list
          fi
          apt-get update -qq

      - name: Override march for aarch64
        run: sed -i 's/-march=x86-64-v3/-march=armv8.2-a+crypto/' config/cflags.conf

      - name: Make scripts executable
        run: chmod +x scripts/*.sh

      - name: Build all packages
        run: scripts/build-all.sh
        env:
          ARCH:    aarch64
          PRIVKEY: /tmp/silex-keys/silex-packages.rsa
          PUBKEY:  /tmp/silex-keys/silex-packages.rsa.pub

      - name: Verify
        run: scripts/verify.sh aarch64

      - uses: actions/upload-artifact@v4
        with:
          name: packages-aarch64
          path: aarch64/

  test:
    name: Test (x86_64)
    needs: [build-x86_64]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: packages-x86_64
          path: x86_64/

      - name: Test package install
        run: |
          docker run --rm \
            --volume "$GITHUB_WORKSPACE/x86_64:/repo" \
            --volume "$GITHUB_WORKSPACE/keys:/keys:ro" \
            alpine:3.21 sh -c '
              set -e

              cp /keys/*.rsa.pub /etc/apk/keys/
              printf "file:///repo\n" > /etc/apk/repositories
              apk update

              # Count packages in index
              count=$(tar -xOf /repo/APKINDEX.tar.gz APKINDEX 2>/dev/null \
                          | grep -c "^P:" || true)
              printf "index: %d packages\n" "$count"
              [ "$count" -gt 50 ] || { printf "FAIL: expected >50 packages in index\n"; exit 1; }

              # Install representative packages.
              # --force-depends: skip libc6 etc. from skip.list that are absent
              #   from this isolated file:// repo but present in any real base image.
              apk add --force-depends \
                  libssl-dev zlib1g-dev libcurl4-openssl-dev

              # Verify expected headers were extracted
              test -f /usr/include/openssl/ssl.h || { printf "FAIL: ssl.h missing\n";  exit 1; }
              test -f /usr/include/zlib.h        || { printf "FAIL: zlib.h missing\n"; exit 1; }
              test -f /usr/include/curl/curl.h   || { printf "FAIL: curl.h missing\n"; exit 1; }

              printf "install test: PASS\n"
            '

  deploy:
    name: Deploy to Pages
    needs: [build-x86_64, build-aarch64, test]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: packages-x86_64
          path: x86_64/

      - uses: actions/download-artifact@v4
        with:
          name: packages-aarch64
          path: aarch64/

      - name: Commit and push
        run: |
          git config user.name "silex-ci"
          git config user.email "ci@silex"
          git add -f x86_64/ aarch64/ keys/
          git commit -m "rebuild $(date -u +%Y-%m-%dT%H:%M:%SZ)" || true
          git pull --rebase origin main
          git push
