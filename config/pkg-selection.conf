# Package selection configuration for automated seeds.list generation
# Edit these values to adjust what packages are included in the APK repository

# Maximum total compressed package size in GB
MAX_SIZE_GB=4

# Package priorities to include (in order)
# Debian priorities: required > important > standard > optional
INCLUDE_PRIORITIES="required important standard"

# Optional packages to include (glob patterns, space-separated)
# Useful categories: build-essential, cmake, make, gcc, g++, python*, nodejs, lib*-dev, curl, wget, git
INCLUDE_OPTIONAL_CATEGORIES="build-essential cmake make autoconf automake libtool gcc g++ gfortran clang gdb git curl wget jq sqlite3 python3 nodejs npm perl ruby lua golang rust zlib1g libssl3 openssl ca-certificates binutils grep sed awk patch find xargs tar gzip bzip2 xz-utils zip unzip file less vim nano emacs"

# Packages/patterns to exclude (regex patterns, one per line)
# Excludes GUI, games, documentation, debug symbols, and transitional packages
EXCLUDE_PATTERNS="
.*-doc$
.*-dbg$
.*-dbgsym$
.*-transitional$
^fonts-.*
^games-.*
^office-.*
^gui-.*
^x11-.*
^qt.*
^gtk.*
^wx.*
^desktop-.*
^gnome-.*
^kde-.*
^xfce-.*
^gimp
^blender
^audacity
^firefox
^chromium
"

# Size threshold (in bytes) - stop adding packages when reached
# Default 4GB = 4294967296 bytes
SIZE_LIMIT=$((4 * 1024 * 1024 * 1024))
